# ManaCity Nginx Configuration
# Put this in /etc/nginx/sites-available/manacity.in and symlink to sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name manacity.in *.manacity.in;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name manacity.in;

    # SSL Certificates (Configure path to your SSL certificate files)
    ssl_certificate /etc/letsencrypt/live/manacity.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manacity.in/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Root for the React Frontend build
    root /var/www/manacity/web/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;

    # API Proxy Rules
    location /api/ {
        proxy_pass http://127.0.0.1:5009/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend Routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logs
    access_log /var/log/nginx/manacity.access.log;
    error_log /var/log/nginx/manacity.error.log warn;
}

# Subdomain Handling for generated websites
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.manacity.in;

    # Wildcard SSL Certificates (Ensure you have a wildcard SSL cert configured)
    ssl_certificate /etc/letsencrypt/live/manacity.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manacity.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    location / {
        # Extract subdomain from host
        # e.g., subdomain.manacity.in -> subdomain
        resolver 127.0.0.53 valid=30s;
        
        # Route to the public dynamic renderer endpoint on backend
        if ($host ~* ^([a-z0-9-]+)\.manacity\.in$) {
            set $subdomain $1;
        }

        # Don't proxy if subdomain is 'www' or empty
        if ($subdomain = "www") {
            return 301 https://manacity.in$request_uri;
        }

        proxy_pass http://127.0.0.1:5009/api/website/public/$subdomain;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logs
    access_log /var/log/nginx/manacity_subdomains.access.log;
    error_log /var/log/nginx/manacity_subdomains.error.log warn;
}
