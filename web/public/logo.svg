<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="100%" height="100%">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1976D2" />
      <stop offset="100%" stop-color="#0D3B66" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7AC943" />
      <stop offset="100%" stop-color="#22B573" />
    </linearGradient>
  </defs>

  <g transform="translate(15, 10)">
    <!-- THE STYLIZED 'M' MARK -->
    <!-- Left Pillar of M (Blue) -->
    <path d="M 20,110 L 20,55 C 20,35 48,35 48,55 L 48,80 C 48,80 32,80 32,55 C 32,47 28,47 28,55 L 28,110 Z" fill="url(#blueGrad)" />
    <!-- Right Pillar of M (Blue) -->
    <path d="M 92,110 L 92,55 C 92,47 88,47 88,55 C 88,80 72,80 72,80 L 72,55 C 72,35 100,35 100,55 L 100,110 Z" fill="url(#blueGrad)" />
    
    <!-- Central V shape (Blue base behind green check) -->
    <path d="M 48,70 C 50,85 70,85 72,70" fill="none" stroke="url(#blueGrad)" stroke-width="12" stroke-linecap="round" />

    <!-- Window Panes (House Icon base) -->
    <g transform="translate(51, 85)" fill="#1976D2">
      <rect x="0" y="0" width="8" height="8" rx="1.5" />
      <rect x="11" y="0" width="8" height="8" rx="1.5" />
      <rect x="0" y="11" width="8" height="8" rx="1.5" />
      <rect x="11" y="11" width="8" height="8" rx="1.5" />
    </g>

    <!-- Green Checkmark & Rising Arrow -->
    <path d="M 46,62 L 60,78 L 104,36" fill="none" stroke="url(#greenGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Arrowhead pointing top-right -->
    <path d="M 94,33 L 111,32 L 109,49 Z" fill="#22B573" />

    <!-- Location Pin at the center top -->
    <g transform="translate(50, 10)">
      <path d="M 10,0 C 4.5,0 0,4.5 0,10 C 0,17 10,26 10,26 C 10,26 20,17 20,10 C 20,4.5 15.5,0 10,0 Z" fill="#22B573" />
      <circle cx="10" cy="10" r="4.5" fill="#FFFFFF" />
    </g>
  </g>

  <!-- TYPOGRAPHY -->
  <g transform="translate(160, 95)">
    <!-- ManaCity text -->
    <text font-family="'Outfit', sans-serif" font-weight="800" font-size="64" fill="#0D3B66">Mana<tspan fill="#22B573">City</tspan></text>
    
    <!-- Tagline: "The Smart Business Growth Platform" with green side lines -->
    <g transform="translate(0, 24)">
      <!-- Left line -->
      <line x1="3" y1="-5" x2="25" y2="-5" stroke="#22B573" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- Tagline text -->
      <text x="35" y="0" font-family="'Outfit', sans-serif" font-weight="700" font-size="14" fill="#0D3B66" letter-spacing="0.5">The Smart Business Growth Platform</text>
      
      <!-- Right line -->
      <line x1="305" y1="-5" x2="327" y2="-5" stroke="#22B573" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>
</svg>
