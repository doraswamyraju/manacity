<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1976D2" />
      <stop offset="100%" stop-color="#0D3B66" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7AC943" />
      <stop offset="100%" stop-color="#22B573" />
    </linearGradient>
  </defs>

  <!-- LOGO MARK (Centered) -->
  <g transform="translate(140, 40)">
    <!-- Left Pillar of M (Blue) -->
    <path d="M 15,100 L 15,45 C 15,22 45,22 45,45 L 45,75 L 35,75 L 35,45 C 35,35 25,35 25,45 L 25,100 Z" fill="url(#blueGrad)" />
    
    <!-- Right Pillar of M (Blue) -->
    <path d="M 95,100 L 95,45 C 95,35 85,35 85,45 L 85,75 L 75,75 L 75,45 C 75,22 105,22 105,45 L 105,100 Z" fill="url(#blueGrad)" />
    
    <!-- Central V shape (Blue base) -->
    <path d="M 45,60 C 45,80 75,80 75,60" fill="none" stroke="url(#blueGrad)" stroke-width="10" stroke-linecap="round" />

    <!-- Window Panes (House Icon base) -->
    <g transform="translate(51, 74)" fill="#1976D2">
      <rect x="0" y="0" width="8" height="8" rx="1.5" />
      <rect x="11" y="0" width="8" height="8" rx="1.5" />
      <rect x="0" y="11" width="8" height="8" rx="1.5" />
      <rect x="11" y="11" width="8" height="8" rx="1.5" />
    </g>

    <!-- Green Checkmark & Rising Arrow -->
    <path d="M 43,55 L 60,73 L 110,25" fill="none" stroke="url(#greenGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Arrowhead -->
    <path d="M 98,22 L 117,21 L 115,40 Z" fill="#22B573" />

    <!-- Location Pin -->
    <g transform="translate(50, 2)">
      <path d="M 10,0 C 4.5,0 0,4.5 0,10 C 0,17 10,26 10,26 C 10,26 20,17 20,10 C 20,4.5 15.5,0 10,0 Z" fill="#22B573" />
      <circle cx="10" cy="10" r="4.5" fill="#FFFFFF" />
    </g>
  </g>

  <!-- TYPOGRAPHY (Centered) -->
  <g transform="translate(200, 240)">
    <!-- ManaCity text -->
    <text text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="800" font-size="60" fill="#0D3B66">Mana<tspan fill="#22B573">City</tspan></text>
    
    <!-- Tagline: "The Smart Business Growth Platform" with green side lines -->
    <g transform="translate(0, 35)">
      <!-- Left line -->
      <line x1="-165" y1="-5" x2="-145" y2="-5" stroke="#22B573" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- Tagline text -->
      <text text-anchor="middle" x="0" y="0" font-family="'Outfit', sans-serif" font-weight="700" font-size="13" fill="#0D3B66" letter-spacing="0.2">The Smart Business Growth Platform</text>
      
      <!-- Right line -->
      <line x1="145" y1="-5" x2="165" y2="-5" stroke="#22B573" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>
</svg>
